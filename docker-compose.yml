services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentic}
      POSTGRES_USER: ${POSTGRES_USER:-agentic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentic} -d ${POSTGRES_DB:-agentic}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Slim retrieval API only (Postgres + shared schema); no Redis/MinIO required. Port 8001.
  rag_adhoc:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command:
      - "uvicorn"
      - "apps.rag_adhoc.app:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    environment:
      RAG_ADHOC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentic}:${POSTGRES_PASSWORD:-agentic}@postgres:5432/${POSTGRES_DB:-agentic}
      RAG_ADHOC_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_ADHOC_API_KEY: ${RAG_ADHOC_API_KEY:-}
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      postgres: {condition: service_healthy}

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/app/docker/entrypoint-api.sh"]
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      minio:    {condition: service_healthy}

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "apps.signal_gather.entrypoints.worker"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      api:      {condition: service_started}

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "apps.signal_gather.entrypoints.scheduler"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      api:      {condition: service_started}

  # Claude Code CLI behind FastAPI. Port 8002.
  # Auth: mount a host directory holding `claude auth login` state to /home/app/.claude
  # (default Claude config dir). For Pro/subscription, run `claude auth login` once
  # on the host into ./claude_home, then it persists into the container.
  claude_agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.claude_agent
    env_file:
      - .env
      - apps/claude_agent/.env
      - /etc/claude-worker.env
    environment:
      CLAUDE_AGENT_WORKSPACE_DIR: /workspace/claude_agent_fe
      CLAUDE_AGENT_LOG_LEVEL: ${CLAUDE_AGENT_LOG_LEVEL:-INFO}
      CLAUDE_AGENT_API_KEY: ${CLAUDE_AGENT_API_KEY:-}
      CLAUDE_AGENT_DEFAULT_MODEL: ${CLAUDE_AGENT_DEFAULT_MODEL:-}
      CLAUDE_AGENT_ALLOW_FREEFORM_PROMPTS: ${CLAUDE_AGENT_ALLOW_FREEFORM_PROMPTS:-false}
      CLAUDE_AGENT_STATE_DIR: ${CLAUDE_AGENT_STATE_DIR:-/state}
      CLAUDE_AGENT_SCHEMA_VERSION: ${CLAUDE_AGENT_SCHEMA_VERSION:-0.2.0}
      CLAUDE_AGENT_ENV_VERSION: ${CLAUDE_AGENT_ENV_VERSION:-1}
      CLAUDE_AGENT_DATABASE_URL: ${CLAUDE_AGENT_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-agentic}:${POSTGRES_PASSWORD:-agentic}@postgres:5432/${POSTGRES_DB:-agentic}}
      HOME: /home/app
    volumes:
      - ./claude_agent_fe:/workspace/claude_agent_fe:rw
      - ${CLAUDE_HOME_DIR:-./claude_home}:/home/app/.claude:rw
      - ${CLAUDE_STATE_DIR:-./state}:/state:rw
    depends_on:
      postgres: { condition: service_healthy }
      api:      { condition: service_started }
    ports:
      - "8002:8002"

volumes:
  postgres_data:
  minio_data:
