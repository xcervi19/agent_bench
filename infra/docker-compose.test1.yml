# Test slot 1 — COMPOSE_PROJECT_NAME=test1 from ~/agent_bench_test1
#   docker compose -f docker-compose.yml -f infra/docker-compose.test1.yml \
#     -f infra/docker-compose.slot-minimal.yml up -d postgres rag_adhoc claude_agent

services:
  postgres:
    ports: !override
      - "127.0.0.1:5433:5432"
  rag_adhoc:
    ports: !override
      - "127.0.0.1:8101:8000"
  claude_agent:
    ports: !override
      - "127.0.0.1:8102:8002"
    environment:
      CLAUDE_AGENT_MAX_CONCURRENT_TOPICS: "2"
    volumes: !override
      - ./claude_agent_fe:/workspace/claude_agent_fe:rw
      - ../agent_bench/claude_home:/home/app/.claude:rw
      - ./state_test1:/state:rw
