# Test slot 1 — use with COMPOSE_PROJECT_NAME=test1 from ~/agent_bench_test1
#   docker compose -f docker-compose.yml -f infra/docker-compose.test1.yml up -d \
#     postgres redis minio api rag_adhoc claude_agent

services:
  postgres:
    ports: !override
      - "127.0.0.1:5433:5432"
  redis:
    ports: !override
      - "127.0.0.1:6380:6379"
  minio:
    ports: !override
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
  rag_adhoc:
    ports: !override
      - "127.0.0.1:8101:8000"
  api:
    ports: !override
      - "127.0.0.1:8100:8000"
  claude_agent:
    ports: !override
      - "127.0.0.1:8102:8002"
    volumes: !override
      - ./claude_agent_fe:/workspace/claude_agent_fe:rw
      - ./claude_home_test1:/home/app/.claude:rw
      - ./state_test1:/state:rw
