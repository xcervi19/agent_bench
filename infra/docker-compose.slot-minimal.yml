# Optional overlay for test slots — same as default compose since #25 slim main.
# Use with test slot overlays, e.g.:
#   COMPOSE_PROJECT_NAME=test1 docker compose \
#     -f docker-compose.yml \
#     -f infra/docker-compose.test1.yml \
#     -f infra/docker-compose.slot-minimal.yml \
#     up -d postgres rag_adhoc claude_agent

services:
  claude_agent:
    depends_on: !override
      postgres:
        condition: service_healthy
