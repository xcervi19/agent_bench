# Test slot 2 — use with COMPOSE_PROJECT_NAME=test2 from ~/agent_bench_test2
#   docker compose -f docker-compose.yml -f infra/docker-compose.test2.yml up -d \
#     postgres redis minio api rag_adhoc claude_agent

services:
  postgres:
    ports: !override
      - "127.0.0.1:5434:5432"
  redis:
    ports: !override
      - "127.0.0.1:6381:6379"
  minio:
    ports: !override
      - "127.0.0.1:9200:9000"
      - "127.0.0.1:9201:9001"
  rag_adhoc:
    ports: !override
      - "127.0.0.1:8201:8000"
  api:
    ports: !override
      - "127.0.0.1:8200:8000"
  claude_agent:
    ports: !override
      - "127.0.0.1:8202:8002"
    volumes: !override
      - ./claude_agent_fe:/workspace/claude_agent_fe:rw
      - ./claude_home_test2:/home/app/.claude:rw
      - ./state_test2:/state:rw
