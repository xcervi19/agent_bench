# Test slot 2 — COMPOSE_PROJECT_NAME=test2 from ~/agent_bench_test2
#   docker compose -f docker-compose.yml -f infra/docker-compose.test2.yml \
#     -f infra/docker-compose.slot-minimal.yml up -d postgres rag_adhoc claude_agent

services:
  postgres:
    ports: !override
      - "127.0.0.1:5434:5432"
  rag_adhoc:
    ports: !override
      - "127.0.0.1:8201:8000"
  claude_agent:
    ports: !override
      - "127.0.0.1:8202:8002"
    environment:
      CLAUDE_AGENT_MAX_CONCURRENT_TOPICS: "2"
    volumes: !override
      - ./claude_agent_fe:/workspace/claude_agent_fe:rw
      - ../agent_bench/claude_home:/home/app/.claude:rw
      - ./state_test2:/state:rw
